version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: wetter-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=change-me-secure-password
      - DOCKER_INFLUXDB_INIT_ORG=wetter
      - DOCKER_INFLUXDB_INIT_BUCKET=weather
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: wetter-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - influxdb
    volumes:
      - ./import:/app/import
      - ./frontend:/app/static
    restart: unless-stopped

volumes:
  influxdb-data:
